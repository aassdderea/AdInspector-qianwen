name: Build AdInspector Tweak (Linux)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🔥 缓存 Theos、SDK 和 Linux 工具链
      - name: Cache Theos & SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: |
            ~/theos
            ~/.theos
          key: theos-linux-sdk-v1

      # 安装 Linux 交叉编译依赖 + Theos
      - name: Install Dependencies & Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential fakeroot git perl xz-utils zip unzip curl \
            libxml2-dev libssl-dev zlib1g-dev
            
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      # 编译 Tweak（Linux 下自动使用交叉编译工具链）
      - name: Build Package
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1

      # 上传编译产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdInspector-Tweak-Linux
          path: packages/*.deb
          retention-days: 7

name: Build AdInspector Dylib

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Cache Theos & SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: |
            ~/theos
            ~/.theos
          key: theos-linux-dylib-v1

      - name: Install Dependencies & Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential fakeroot git perl xz-utils zip unzip curl libxml2-dev libssl-dev zlib1g-dev
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      # 🔥 关键变更：仅编译，不打包，彻底跳过 Filter Plist 校验
      - name: Build Dylib Only
        run: |
          export THEOS=~/theos
          make TARGET=iphone:clang:latest:14.0 ARCHS="arm64 arm64e"

      # 🔥 上传裸 dylib 产物
      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdInspector-Dylib
          path: .theos/obj/*/AdInspector.dylib
          retention-days: 7

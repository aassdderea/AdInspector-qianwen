name: Build AdInspector Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 🔥 缓存 Theos 和 iOS SDK，避免每次重新下载触发 API 限流
      - name: Cache Theos & SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: |
            ~/theos
            ~/.theos
          key: theos-macos13-sdk-v1

      # 仅在缓存未命中时安装 Theos 和 SDK
      - name: Install Theos & SDKs
        if: steps.cache-theos.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      # 编译 Tweak
      - name: Build Package
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1

      # 上传编译产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdInspector-Tweak
          path: packages/*.deb
          retention-days: 7
